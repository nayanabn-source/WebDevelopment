<!DOCTYPE html>
<html>
<head>
    <title>Responsive Hero Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .hero {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 50px;
            background-color: #f4f6f9;
        }

        .hero-text {
            flex: 1;
        }

        .hero-text h1 {
            font-size: 40px;
            color: #2c3e50;
        }

        .hero-text p {
            font-size: 18px;
            margin: 20px 0;
            color: #555;
        }

        .hero-text button {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            background-color: #3498db;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .hero-text button:hover {
            background-color: #2980b9;
        }

        .hero-image {
            flex: 1;
            text-align: center;
        }

        .hero-image img {
            max-width: 100%;
            height: auto;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .hero {
                flex-direction: column;
                text-align: center;
            }

            .hero-text h1 {
                font-size: 28px;
            }

            .hero {
                padding: 30px;
            }
        }
    </style>
</head>

<body>

<section class="hero">
    
    <div class="hero-text">
        <h1>Welcome to My Website</h1>
        <p>
            I am a passionate web developer learning modern web technologies.
            This is a responsive hero section built using Flexbox.
        </p>
        <button>Get Started</button>
    </div>

    <div class="hero-image">
        <img src="https://via.placeholder.com/400" alt="Hero Image">
    </div>

</section>

</body>
</html>
